name: Test valgrind suppression file
# Jobs run daily

on:
  schedule:
    - cron: '30 02 * * *'
  workflow_dispatch:
    inputs:
      pr:
        description: 'Internal: openssl-ci-bot PR number. Leave empty for a normal manual run.'
        required: false
        type: string
      head_sha:
        description: 'Internal: openssl-ci-bot commit SHA. Leave empty for a normal manual run.'
        required: false
        type: string
      check_run_id:
        description: 'Internal: openssl-ci-bot check-run ID. Leave empty for a normal manual run.'
        required: false
        type: string

# Keep in sync with openssl-ci-bot's run-name parser.
run-name: >-
  ${{ github.event.inputs.pr && format('ci-dispatch pr={0} head={1} check_run_id={2}', github.event.inputs.pr, github.event.inputs.head_sha, github.event.inputs.check_run_id) || github.workflow }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.pr || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
    validate-dispatch-inputs:
      if: |
        github.repository == 'openssl/openssl' &&
        (inputs.pr != '' || inputs.head_sha != '' || inputs.check_run_id != '')
      uses: ./.github/workflows/validate-dispatch-inputs.yml
      with:
        pr: ${{ inputs.pr }}
        head_sha: ${{ inputs.head_sha }}
        check_run_id: ${{ inputs.check_run_id }}

    check-valgrind-suppressions:
      needs: [validate-dispatch-inputs]
      if: |
        github.repository == 'openssl/openssl' &&
        always() &&
        (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
          with:
            persist-credentials: false
            ref: ${{ github.event.inputs.head_sha || github.sha }}
        - name: Install valgrind
          run: |
            sudo apt-get -y update
            sudo apt-get -y install valgrind
        - name: Get parse suppressions script
          run: |
            wget https://raw.githubusercontent.com/coqui-ai/STT/refs/tags/v1.4.0/parse_valgrind_suppressions.sh
            echo "7414fcb9405f8bd1632442a0b66ffb35457994c6b8b49b2aa91530cf9a7ff645  ./parse_valgrind_suppressions.sh" > ./valgrind_suppressions.sha256
            sha256sum -c ./valgrind_suppressions.sha256
            chmod 755 ./parse_valgrind_suppressions.sh
        - name: Configure
          run: |
            ./Configure -DOPENSSL_VALGRIND_TEST
            ./configdata.pm --dump
        - name: Make
          run: |
            make -j
        - name: Make test
          run: |
            # The quic radix and multistream test times out under valgrind in ci
            make TESTS="-test_quic_radix -test_quic_multistream" OSSL_USE_VALGRIND=yes test
        - name: Check for leaks
          run: |
            set +e
            NUM_LOGS=$(find . -name 'valgrind.log.*' | wc -l)
            echo "Found $NUM_LOGS valgrind logs"
            if [ $NUM_LOGS == 0 ]; then
              echo "No logs found!"
              exit 1
            fi
            for i in $(find . -name 'valgrind.log.*'); do
              ./parse_valgrind_suppressions.sh $i >> ./new_suppressions.txt
            done
            NEW_SUPPRESSION_LINES=$(cat ./new_suppressions.txt | wc -l)
            if [ $NEW_SUPPRESSION_LINES != 0 ]; then
              echo "New Suppressions Found that need to be addressed!"
              cat ./new_suppressions.txt
              exit 1
            fi
            echo "No new suppressions found"
            exit 0
