name: Cross Compile

on: [pull_request, push]

permissions:
  contents: read

jobs:
  cross-compilation:
    # Run the full test suite on push, and on pull requests labelled with
    # 'extended tests'.  Other pull requests only run the EVP tests.
    env:
      EXTENDED: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'extended tests') }}
    strategy:
      fail-fast: false
      matrix:
        # The platform matrix specifies:
        #   arch: the architecture to build for, this defines the tool-chain
        #         prefix {arch}- and the Debian compiler package gcc-{arch}
        #         name.
        #   libs: the Debian package for the necessary link/runtime libraries.
        #   target: the OpenSSL configuration target to use, this is passed
        #           directly to the config command line.
        #   fips:   set to "no" to disable building FIPS, leave unset to
        #           build the FIPS provider.
        #   tests: omit this to run all the tests using QEMU, set it to "none"
        #          to never run the tests, otherwise its value is passed to
        #          the "make test" command to allow selective disabling of
        #          tests.
        #   qemucpu: optional; string that describes CPU properties.
        #            The string will be used to set the QEMU_CPU variable.
        #   opensslcapsname: optional; string that describes the postfix of the
        #                    OpenSSL environment variable that defines CPU
        #                    capabilities. E.g. "foo" will result in an
        #                    environment variable with the name OPENSSL_foo.
        #   opensslcaps: optional; if opensslcapsname (see above) is set, then
        #                this string will be used as content for the OpenSSL
        #                capabilities variable.
        #   ppa:   Launchpad PPA repository to download packages from.
        #   compiler: optional; set to "clang" to build with Clang instead of
        #             GCC.  The cross-compile prefix is still used for the
        #             binutils (assembler, linker, nm …).
        #   nm_check: optional; when set, a post-build step verifies that the
        #             six ML-KEM VX vector-entry-point symbols are present as
        #             text symbols in the ml_kem_vec128.o object file.
        #   label: optional; used as the artifact name suffix in place of
        #          arch, to disambiguate matrix jobs that share the same arch.
        platform: [
          {
            arch: i386-pc-msdosdjgpp,
            libs: libc-djgpp-dev libwatt-djgpp-dev djgpp-utils,
            target: no-threads 386 DJGPP,
            tests: none,
            ppa: jwt27/djgpp-toolchain
          }, {
            arch: aarch64-linux-gnu,
            libs: libc6-dev-arm64-cross,
            target: linux-aarch64,
            fips: no
          }, {
            arch: alpha-linux-gnu,
            libs: libc6.1-dev-alpha-cross,
            target: linux-alpha-gcc,
            fips: no
          }, {
            arch: arm-linux-gnueabi,
            libs: libc6-dev-armel-cross,
            target: linux-armv4,
            fips: no,
            tests: -test_includes -test_store -test_x509_store
          }, {
            arch: arm-linux-gnueabihf,
            libs: libc6-dev-armhf-cross,
            target: linux-armv4,
            fips: no,
            tests: -test_includes -test_store -test_x509_store
          }, {
            # gcc hppa seems to have some potential compiler issues
            # with -O2 on this platform, reduce optimization to -01
            arch: hppa-linux-gnu,
            libs: libc6-dev-hppa-cross,
            target: -static -O1 linux-generic32,
            fips: no,
            tests: -test_includes -test_store -test_x509_store
          }, {
            arch: m68k-linux-gnu,
            libs: libc6-dev-m68k-cross,
            target: -static -m68040 linux-latomic -Wno-stringop-overflow,
            fips: no,
            tests: -test_includes -test_store -test_x509_store
          }, {
            arch: mips-linux-gnu,
            libs: libc6-dev-mips-cross,
            target: -static linux-mips32,
            fips: no,
            tests: -test_includes -test_store -test_x509_store
          }, {
            arch: mips64-linux-gnuabi64,
            libs: libc6-dev-mips64-cross,
            target: -static linux64-mips64,
            fips: no
          }, {
            arch: mipsel-linux-gnu,
            libs: libc6-dev-mipsel-cross,
            target: linux-mips32,
            fips: no,
            tests: -test_includes -test_store -test_x509_store
          }, {
            arch: powerpc64le-linux-gnu,
            libs: libc6-dev-ppc64el-cross,
            target: linux-ppc64le,
            fips: no
          }, {
            arch: riscv64-linux-gnu,
            libs: libc6-dev-riscv64-cross,
            target: linux64-riscv64,
            fips: no
          }, {
            # No QEMU_CPU or caps override: the binary would probe for CPACF
            # instructions via stfle/sigill, all of which QEMU can't execute.
            # z900 zeros every CPACF vector so OpenSSL uses the pure-software
            # fallback paths; the VX facility is also absent on z900 which is
            # correct (this job tests the generic non-VX scalar paths).
            arch: s390x-linux-gnu,
            libs: libc6-dev-s390x-cross,
            target: linux64-s390x,
            fips: no,
            opensslcapsname: s390xcap,
            opensslcaps: z900
          }, {
            # Build-only: verify no-asm does not produce undefined references to
            # OPENSSL_s390xcap_P (which is only compiled when asm is enabled).
            arch: s390x-linux-gnu,
            libs: libc6-dev-s390x-cross,
            target: no-shared no-asm linux64-s390x,
            fips: no,
            tests: none
          }, {
            # GCC / z13 / VX enabled (FIPS).
            # The base linux64-s390x target carries no -march flag, so the
            # whole library is safe to execute on any s390x CPU.
            # ml_kem_vec128.c and ml_dsa_ntt_vec128.c use "#pragma GCC target"
            # to scope VX codegen to those TUs only.
            # QEMU_CPU=z13: VX is included in the z13 model; QEMU >= 7.x
            # no longer accepts vxeh=on for z13 (vxeh was introduced in z14).
            # OPENSSL_s390xcap=z13 sets S390X_VX_CAPABLE so the vec128 paths
            # are exercised.
            # The nm_check step asserts all six ML-KEM VX symbols are present.
            arch: s390x-linux-gnu,
            libs: libc6-dev-s390x-cross,
            target: linux64-s390x,
            qemucpu: z13,
            opensslcapsname: s390xcap,
            # Enable the VX facility bit (stfle[2] bit 129 = 0x4000000000000000)
            # while zeroing every CPACF instruction vector (kimd/klmd/km/…).
            # QEMU emulates the VX vector-register instructions but cannot
            # execute CPACF instructions; this lets the VX code paths run
            # under QEMU without triggering illegal-instruction traps.
            opensslcaps: "stfle:0:0:4000000000000000;kimd:0:0;klmd:0:0;km:0:0;kmc:0:0;kmac:0:0;kmctr:0:0;kmo:0:0;kmf:0:0;prno:0:0;kma:0:0;pcc:0:0;kdsa:0:0",
            tests: test_internal_ml_kem test_evp_extra_ml_kem test_ml_kem_codecs test_evp*,
            nm_check: "yes",
            label: s390x-gcc-z13-vx-on-fips
          }, {
            # GCC / z13 / VX masked off (no FIPS).
            # Same base build (linux64-s390x, no -march) but OPENSSL_s390xcap
            # is set to "zEC12" (no VX) so S390X_VX_CAPABLE is false and
            # the generic scalar path is exercised on the same binary.
            arch: s390x-linux-gnu,
            libs: libc6-dev-s390x-cross,
            target: linux64-s390x,
            fips: no,
            qemucpu: z13,
            opensslcapsname: s390xcap,
            # z900 zeros all CPACF vectors and all stfle facility bits including
            # VX, exercising the scalar fallback path without QEMU CPACF traps.
            opensslcaps: z900,
            tests: test_internal_ml_kem test_evp_extra_ml_kem test_ml_kem_codecs test_evp*,
            label: s390x-gcc-z13-vx-off
          }, {
            # Clang / z13 / VX enabled (FIPS).
            # Clang does not honour #pragma GCC target for preprocessor-level
            # macros, so -march=z13 must be passed to make Clang define __VX__
            # and enable the vector code paths.  -march=z13 is safe to run on
            # any z13+ CPU and does not imply z14-only instructions.
            # Configure also adds -fzvector when Clang needs it to include
            # <vecintrin.h>; that flag only unlocks vecintrin.h header access.
            # Verifies that Clang emits all six ML-KEM VX vector entry points.
            # QEMU_CPU=z13: VX is part of z13; vxeh=on is rejected by QEMU >= 7.x.
            arch: s390x-linux-gnu,
            libs: libc6-dev-s390x-cross,
            target: -march=z13 linux64-s390x,
            compiler: clang,
            qemucpu: z13,
            opensslcapsname: s390xcap,
            opensslcaps: "stfle:0:0:4000000000000000;kimd:0:0;klmd:0:0;km:0:0;kmc:0:0;kmac:0:0;kmctr:0:0;kmo:0:0;kmf:0:0;prno:0:0;kma:0:0;pcc:0:0;kdsa:0:0",
            tests: test_internal_ml_kem test_evp_extra_ml_kem test_ml_kem_codecs test_evp*,
            nm_check: "yes",
            label: s390x-clang-z13-vx-on-fips
          }, {
            # Clang / z13 / VX masked off (no FIPS).
            # Same -march=z13 build but OPENSSL_s390xcap=z900 masks off VX and
            # all CPACF so the generic scalar path is exercised under QEMU.
            arch: s390x-linux-gnu,
            libs: libc6-dev-s390x-cross,
            target: -march=z13 linux64-s390x,
            fips: no,
            compiler: clang,
            qemucpu: z13,
            opensslcapsname: s390xcap,
            opensslcaps: z900,
            tests: test_internal_ml_kem test_evp_extra_ml_kem test_ml_kem_codecs test_evp*,
            label: s390x-clang-z13-vx-off
          }, {
            arch: sh4-linux-gnu,
            libs: libc6-dev-sh4-cross,
            target: no-async linux-latomic,
            fips: no,
            tests: -test_includes -test_store -test_x509_store
          },

          # These build with shared libraries but they crash when run
          # They mirror static builds above in order to cover more of the
          # code base.
          {
            arch: hppa-linux-gnu,
            libs: libc6-dev-hppa-cross,
            target: linux-generic32,
            tests: none
          }, {
            arch: m68k-linux-gnu,
            libs: libc6-dev-m68k-cross,
            target: -mcfv4e -mxgot linux-latomic -Wno-stringop-overflow no-quic,
            tests: none
          }, {
            arch: mips-linux-gnu,
            libs: libc6-dev-mips-cross,
            target: linux-mips32,
            tests: none
          }, {
            arch: mips64-linux-gnuabi64,
            libs: libc6-dev-mips64-cross,
            target: linux64-mips64,
            tests: none
          },

          # This build doesn't execute either with or without shared libraries.
          {
            arch: sparc64-linux-gnu,
            libs: libc6-dev-sparc64-cross,
            target: linux64-sparcv9,
            tests: none
          }
        ]
    runs-on: ubuntu-latest
    steps:
    - name: install package repository
      if: matrix.platform.ppa != ''
      run: |
        sudo add-apt-repository ppa:${{ matrix.platform.ppa }}
    - name: install packages (GCC)
      if: matrix.platform.compiler != 'clang'
      run: |
        sudo apt-get update
        sudo apt-get -yq --allow-unauthenticated --allow-downgrades --allow-remove-essential --allow-change-held-packages install \
            gcc-${{ matrix.platform.arch }} \
            ${{ matrix.platform.libs }}
    - name: install packages (Clang)
      if: matrix.platform.compiler == 'clang'
      run: |
        sudo apt-get update
        sudo apt-get -yq --allow-unauthenticated --allow-downgrades --allow-remove-essential --allow-change-held-packages install \
            clang \
            binutils-${{ matrix.platform.arch }} \
            gcc-${{ matrix.platform.arch }} \
            ${{ matrix.platform.libs }}
        # Detect sysroot: Ubuntu <=22.04 uses .../sys-root, 24.04+ installs directly.
        SYSROOT=/usr/${{ matrix.platform.arch }}/sys-root
        [ -d "$SYSROOT" ] || SYSROOT=/usr/${{ matrix.platform.arch }}
        echo "CROSS_SYSROOT=$SYSROOT" >> $GITHUB_ENV
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora

    - name: config with FIPS (GCC)
      if: matrix.platform.fips != 'no' && matrix.platform.compiler != 'clang'
      run: |
        ./config --banner=Configured --strict-warnings enable-fips enable-lms \
                 --cross-compile-prefix=${{ matrix.platform.arch }}- \
                 ${{ matrix.platform.target }}
    - name: config without FIPS (GCC)
      if: matrix.platform.fips == 'no' && matrix.platform.compiler != 'clang'
      run: |
        ./config --banner=Configured --strict-warnings enable-lms \
                 --cross-compile-prefix=${{ matrix.platform.arch }}- \
                 ${{ matrix.platform.target }}
    - name: config with FIPS (Clang)
      if: matrix.platform.fips != 'no' && matrix.platform.compiler == 'clang'
      env:
        CC: clang --target=${{ matrix.platform.arch }} --sysroot=${{ env.CROSS_SYSROOT }}
        AR: ${{ matrix.platform.arch }}-ar
        RANLIB: ${{ matrix.platform.arch }}-ranlib
        AS: ${{ matrix.platform.arch }}-as
        # Reset the linker sysroot to / so that absolute-path linker scripts
        # shipped by libc6-dev-*-cross (e.g. libc.so referencing
        # /usr/<arch>/lib/libc.so.6) are resolved against the real root
        # rather than being doubled-prefixed under CROSS_SYSROOT.
        # LDFLAGS is picked up by OpenSSL's Configure and forwarded to the
        # linker only, leaving compiler-detection probes unaffected.
        LDFLAGS: -Wl,--sysroot=/
      run: |
        ./config --banner=Configured --strict-warnings enable-fips enable-lms \
                 ${{ matrix.platform.target }}
    - name: config without FIPS (Clang)
      if: matrix.platform.fips == 'no' && matrix.platform.compiler == 'clang'
      env:
        CC: clang --target=${{ matrix.platform.arch }} --sysroot=${{ env.CROSS_SYSROOT }}
        AR: ${{ matrix.platform.arch }}-ar
        RANLIB: ${{ matrix.platform.arch }}-ranlib
        AS: ${{ matrix.platform.arch }}-as
        LDFLAGS: -Wl,--sysroot=/
      run: |
        ./config --banner=Configured --strict-warnings enable-lms \
                 ${{ matrix.platform.target }}
    - name: config dump
      run: ./configdata.pm --dump

    - name: make
      run: make -s -j4

    - name: check ML-KEM VX vector symbols
      if: matrix.platform.nm_check != ''
      run: |
        ${{ matrix.platform.arch }}-nm crypto/ml_kem/libcrypto-lib-ml_kem_vec128.o \
          | awk '$2 == "T"' \
          | grep -cE ' (ossl_ml_kem_scalar_ntt_vec128|ossl_ml_kem_scalar_inverse_ntt_vec128|ossl_ml_kem_scalar_inverse_ntt_demontgomerize_vec128|ossl_ml_kem_scalar_mult_add_vec128|ossl_ml_kem_inner_product_montgomery_vec128|ossl_ml_kem_matrix_mult_intt_vec128)$' \
          | grep -q '^6$'

    - name: check ML-DSA VX vector symbols
      if: matrix.platform.nm_check != ''
      run: |
        ${{ matrix.platform.arch }}-nm crypto/ml_dsa/libcrypto-lib-ml_dsa_ntt_vec128.o \
          | awk '$2 == "T"' \
          | grep -cE ' (ossl_ml_dsa_poly_ntt_vec128|ossl_ml_dsa_poly_ntt_inverse_vec128|ossl_poly_ntt_mult_scalar_vec128)$' \
          | grep -q '^3$'

    - name: install qemu
      if: matrix.platform.tests != 'none'
      run: sudo apt-get -yq --allow-unauthenticated --allow-downgrades --allow-remove-essential --allow-change-held-packages install qemu-user

    - name: Set QEMU environment
      if: matrix.platform.qemucpu != ''
      run: echo "QEMU_CPU=${{ matrix.platform.qemucpu }}" >> $GITHUB_ENV

    - name: Set OpenSSL caps environment
      if: matrix.platform.opensslcapsname != ''
      run: echo "OPENSSL_${{ matrix.platform.opensslcapsname }}=\
                 ${{ matrix.platform.opensslcaps }}" >> $GITHUB_ENV

    - name: get cpu info
      if: matrix.platform.tests != 'none'
      run: |
         cat /proc/cpuinfo
         QEMU_LD_PREFIX=/usr/${{ matrix.platform.arch }} ./util/opensslwrap.sh version -c 2>/dev/null || true
    - name: make all tests
      if: env.EXTENDED == 'true' && matrix.platform.tests == ''
      run: |
        .github/workflows/make-test \
                  TESTS="-test_afalg" \
                  QEMU_LD_PREFIX=/usr/${{ matrix.platform.arch }}
    - name: make some tests
      if: matrix.platform.tests != 'none' && matrix.platform.tests != ''
      run: |
        .github/workflows/make-test \
                  TESTS="${{ matrix.platform.tests }} -test_afalg" \
                  QEMU_LD_PREFIX=/usr/${{ matrix.platform.arch }}
    - name: make evp tests
      if: env.EXTENDED != 'true' && matrix.platform.tests == '' && matrix.platform.tests != 'none'
      run: |
        .github/workflows/make-test \
                  TESTS="test_evp*" \
                  QEMU_LD_PREFIX=/usr/${{ matrix.platform.arch }}
    - name: save artifacts
      if: success() || failure()
      uses: actions/upload-artifact@v5
      with:
        name: "cross-compiles@${{ matrix.platform.label || matrix.platform.arch }}"
        path: artifacts.tar.gz
        if-no-files-found: ignore
