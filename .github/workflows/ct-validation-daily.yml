name: Constant-time validation (daily)
# Verifies that several algorithms needing constant-time execution do not
# branch on secret data.
#
# The library is built with enable-ct-validation, which defines
# OPENSSL_CONSTANT_TIME_VALIDATION and causes secret regions to be marked
# as "uninitialised" from Valgrind memcheck's perspective.  The tests are
# then run via "make test" with OSSL_VALGRIND_CT=yes, which makes
# OpenSSL::Test::test() wrap every test binary with:
#
#   valgrind --tool=memcheck --track-origins=yes --error-exitcode=1
#
# The wrapper chain (util/wrap.pl -> util/shlib_wrap.sh) is preserved, so
# LD_LIBRARY_PATH is set correctly for shared-library builds.  Any
# control-flow branch or memory index that depends on secret data causes
# valgrind to exit with code 1, which propagates back through the test
# harness and fails the job.
#
# See include/internal/constant_time.h for the CONSTTIME_SECRET /
# CONSTTIME_DECLASSIFY macro documentation.
#
# Architecture note: Valgrind's memcheck supports x86_64, aarch64, s390x,
# and ppc64 well.  GitHub Actions provides hosted runners for x86_64
# (ubuntu-latest) and aarch64 (ubuntu-24.04-arm); we test both here.
# s390x and ppc64 runners are not available in the public GitHub Actions
# fleet, so they are not included.
#
# Package note: on Debian/Ubuntu the valgrind package bundles the C headers
# (valgrind/memcheck.h) — no separate -dev package is required.  On Fedora
# the headers are in valgrind-devel; see Configure for the full list.

on:
  schedule:
    - cron: '45 03 * * *'
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number (set by the /ci controller; empty for an ordinary manual run)'
        required: false
        default: ''
      head_sha:
        description: 'PR head SHA to build, 40-hex (set by the /ci controller)'
        required: false
        default: ''
      check_run_id:
        description: 'Check-run id to report into (set by the /ci controller)'
        required: false
        default: ''
  # Run automatically when a committer approves the PR.
  pull_request_review:
    types: [submitted]

run-name: "${{ (github.event_name == 'workflow_dispatch' && inputs.pr != '') && format('{0} · /ci PR #{1} · {2} · check:{3}', github.workflow, inputs.pr, inputs.head_sha, inputs.check_run_id) || github.workflow }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.inputs.pr || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

jobs:
  # Decides whether the build jobs run and which commit they build, and records
  # routing metadata for a /ci dispatch. Metadata only: keep it at
  # `contents: read` with no secrets, and never check out PR code here.
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run: ${{ steps.gate.outputs.run }}
      ref: ${{ steps.gate.outputs.ref }}
    steps:
      - uses: actions/github-script@v9.0.0
        id: gate
        with:
          script: |
            const fs = require('fs');
            const eventName = context.eventName;
            const repoOk = `${context.repo.owner}/${context.repo.repo}` === 'openssl/openssl';
            let run = false, ref = '', pr = '', headSha = '', checkRunId = '', meta = false;
            const isCommitter = async (login) => {
              if (!login) return false;
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel(
                { owner: context.repo.owner, repo: context.repo.repo, username: login });
              return data.permission === 'write' || data.permission === 'admin';
            };
            if (eventName === 'schedule') {
              run = repoOk;
            } else if (eventName === 'push' || eventName === 'pull_request') {
              run = true;
            } else if (eventName === 'workflow_dispatch') {
              const i = context.payload.inputs || {};
              if (!i.pr) {
                run = true;                       // ordinary manual dispatch
              } else {                            // /ci on-demand dispatch
                if (!/^\d+$/.test(i.pr) || !/^[0-9a-f]{40}$/.test(i.head_sha)
                    || !/^\d+$/.test(i.check_run_id)) {
                  core.setFailed('Invalid /ci dispatch inputs'); return;
                }
                run = repoOk; ref = i.head_sha; pr = i.pr; headSha = i.head_sha;
                checkRunId = i.check_run_id; meta = run;
              }
            } else if (eventName === 'pull_request_review') {
              const rv = context.payload.review, prObj = context.payload.pull_request;
              const base = prObj.base.ref;
              // Only base branches whose protection dismisses stale approvals.
              const baseOk = base === 'master' || base.startsWith('feature/')
                || base.startsWith('openssl-');
              if (repoOk && rv.state === 'approved' && baseOk
                  && rv.commit_id === prObj.head.sha && await isCommitter(rv.user.login)) {
                run = true; ref = rv.commit_id; headSha = rv.commit_id;
                pr = String(prObj.number);
              }
            }
            if (meta) {
              fs.writeFileSync('ci-report-meta.json',
                JSON.stringify({ pr, head_sha: headSha, check_run_id: checkRunId }));
            }
            core.setOutput('run', String(run));
            core.setOutput('ref', ref);
            core.setOutput('meta', String(meta));
      - name: Upload routing metadata
        if: steps.gate.outputs.meta == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-report-meta
          path: ci-report-meta.json
          if-no-files-found: error
  ct-validation:
    needs: authorize
    if: github.repository == 'openssl/openssl' && needs.authorize.outputs.run == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Constant-timeness is a property of the generated machine code, which
        # the compiler derives differently per architecture. Therefore we verify
        # both the assembly and C implementations on every architecture we can
        # run Valgrind on.
        include:
          # Default builds use assembler implementations (when available)
          - name: linux-x86_64
            runs-on: ubuntu-latest
            config_extra: ""
          - name: linux-aarch64
            runs-on: ubuntu-24.04-arm
            config_extra: ""

          # no-asm builds always use C implementations
          - name: linux-x86_64-no-asm
            runs-on: ubuntu-latest
            config_extra: no-asm
          - name: linux-aarch64-no-asm
            runs-on: ubuntu-24.04-arm
            config_extra: no-asm

    name: CT validation (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.authorize.outputs.ref }}
          persist-credentials: false

      - name: Install valgrind
        # On Debian/Ubuntu the main 'valgrind' package includes
        # /usr/include/valgrind/memcheck.h — no separate -dev package needed.
        run: |
          sudo apt-get -y update
          sudo apt-get -y install valgrind

      - name: Configure with CT validation enabled
        run: |
          ./Configure enable-ct-validation ${{ matrix.config_extra }}
          ./configdata.pm --dump

      - name: Build
        run: make -j$(nproc)

      - name: Run CT validation under Valgrind
        # OSSL_VALGRIND_CT=yes causes OpenSSL::Test::test() to wrap each
        # test binary with valgrind --track-origins=yes --error-exitcode=1.
        # util/wrap.pl -> util/shlib_wrap.sh sets LD_LIBRARY_PATH first, so
        # the shared libraries are found correctly.
        #
        # Algorithms covered:
        # - memcmp: test_crypto_memcmp
        # - ML-KEM: test_internal_ml_kem
        # - ML-DSA: test_internal_ml_dsa
        run: |
          make TESTS="test_internal_ml_kem test_internal_ml_dsa test_crypto_memcmp" \
               OSSL_VALGRIND_CT=yes \
               test
