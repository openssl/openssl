name: CIFuzz
on: [pull_request, push]
permissions:
  contents: read

jobs:
  Fuzzing:
    # The OSS-Fuzz openssl build script builds master plus versioned source
    # trees (openssl30, openssl33, ...). That layout is only present on
    # master CI, so skip this job on branch backport PRs/pushes.
    if: github.base_ref == 'master' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    steps:
    - name: Clear unnecessary files
      run: |
        df
        sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/android /usr/local/lib/node_modules
        df
    - name: Build Fuzzers
      uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@master
      with:
        oss-fuzz-project-name: 'openssl'
        dry-run: false
    - name: Run Fuzzers
      uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@master
      with:
        oss-fuzz-project-name: 'openssl'
        fuzz-seconds: 600
        dry-run: false
    - name: Upload Crash
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: artifacts
        path: ./out/artifacts
