name: Run-checker daily
# Jobs run daily

on:
  schedule:
    - cron: '30 02 * * *'
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number (leave empty for a bare manual run against the default branch)'
        required: false
        type: string
      head_sha:
        description: 'Exact commit SHA to check out (required when pr is set)'
        required: false
        type: string
      check_run_id:
        description: 'Check-run id to report completion back to (required when pr is set)'
        required: false
        type: string

# Pinned run-name contract with images/openssl-ci-bot/main.py's format_run_name()/
# parse_run_name() -- the completed-run handler parses check_run_id back out of
# this exact format string, so keep both sides identical on any change.
run-name: >-
  ${{ github.event.inputs.pr && format('ci-dispatch pr={0} head={1} check_run_id={2}', github.event.inputs.pr, github.event.inputs.head_sha, github.event.inputs.check_run_id) || github.workflow }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.pr || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-dispatch-inputs:
    # Defense-in-depth on the untrusted-code boundary, in addition to the
    # dispatching service's own validation: fail closed on malformed inputs
    # before anything checks out a ref or runs.
    if: github.repository == 'openssl/openssl' && github.event.inputs.pr != ''
    runs-on: ubuntu-latest
    steps:
      - name: Validate pr / head_sha / check_run_id
        run: |
          [[ "${{ github.event.inputs.pr }}" =~ ^[0-9]+$ ]] || { echo "::error::pr must be numeric"; exit 1; }
          [[ "${{ github.event.inputs.check_run_id }}" =~ ^[0-9]+$ ]] || { echo "::error::check_run_id must be numeric"; exit 1; }
          [[ "${{ github.event.inputs.head_sha }}" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::head_sha must be a 40-character hex commit SHA"; exit 1; }

  run-checker:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        opt: [
          386,
          no-apps,
          no-argon2,
          no-aria,
          no-asan,
          no-asm,
          no-async,
          no-autoalginit,
          no-autoerrinit,
          no-autoload-config,
          no-bf,
          no-blake2,
          no-buildtest-c++,
          no-bulk,
          no-cached-fetch,
          no-camellia,
          no-cast,
          no-chacha,
          no-cmac,
          no-comp,
          enable-crypto-mdebug,
          no-ct,
          enable-demos,
          no-deprecated,
          no-des,
          no-docs,
          no-dsa,
          no-dtls1,
          no-dtls1_2,
          no-dtls1_2-method,
          no-dtls1-method,
          enable-ec_nistp_64_gcc_128,
          enable-egd,
#          enable-external-tests,  # Requires extra setup
          enable-fips,
          enable-fips enable-acvp-tests,
          enable-fips no-tls1_3,
          enable-fips no-des no-dsa no-ec2m,
#          enable-fuzz-afl,        # Requires extra setup
#          enable-fuzz-libfuzzer,  # Requires extra setup
          no-gost,
          enable-h3demo,
          enable-hqinterop,
          no-hmac-drbg-kdf,
          no-hw,
          no-idea,
          no-ikev2kdf,
          no-kbkdf,
          no-krb5kdf,
          enable-lms,
          no-makedepend,
          enable-md2,
          no-md4,
          no-mdc2,
          no-msan,
          no-multiblock,
          no-nextprotoneg,
          no-ocb,
          no-pic,
          no-poly1305,
          no-posix-io,
          no-psk,
          no-pvkkdf,
          no-rc2,
          enable-rc5,
          no-rdrand,
          no-rfc3779,
          no-ripemd,
          no-rmd160,
          no-scrypt,
          no-secure-memory,
          no-seed,
          no-shared,
          no-siphash,
          no-siv,
          no-sm2-precomp,
          no-sm3,
          no-sm4,
          no-snmpkdf,
          no-sock,
          no-srtpkdf,
          no-sse2,
          no-sshkdf,
          no-sskdf,
          no-ssl,
          no-ssl-trace,
          enable-sslkeylog,
          no-shared,
          no-tests,
          enable-tfo,
          no-tls1,
          no-tls1_1,
          no-tls1_1-method,
          no-tls1_2-method,
          no-tls1-method,
          enable-trace,
          no-ubsan,
          no-ui-console,
          enable-unit-test,
          no-uplink,
          no-weak-ssl-ciphers,
          no-whirlpool,
          no-x942kdf,
          no-x963kdf,
          enable-zlib-dynamic,
          -DOPENSSL_PEDANTIC_ZEROIZATION,
          -DOPENSSL_PEDANTIC_ZEROIZATION enable-fips,
          -DOPENSSL_NO_BUILTIN_OVERFLOW_CHECKING,
          -DSSL3_ALIGN_PAYLOAD=4,
          -DOPENSSL_TLS_SECURITY_LEVEL=0
        ]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora
    - name: config
      run: CC=clang ./config --strict-warnings  --banner=Configured --strict-warnings ${{ matrix.opt }}
    - name: config dump
      run: ./configdata.pm --dump
    - name: make
      run: make -s -j4
    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        if [ -x apps/openssl ] ; then ./util/opensslwrap.sh version -c ; fi
    - name: make test
      run: make test HARNESS_JOBS=${HARNESS_JOBS:-4}

  run-checker-sctp:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora
    - name: Install Dependencies for sctp option
      run:  |
        sudo apt-get update
        sudo apt-get -yq install lksctp-tools libsctp-dev

    - name: Check SCTP and enable auth
      id: sctp_auth
      continue-on-error: true
      run:  |
        checksctp
        sudo sysctl -w net.sctp.auth_enable=1

    - name: config
      if: steps.sctp_auth.outcome == 'success' && steps.sctp_auth.conclusion == 'success'
      run: CC=clang ./config --strict-warnings --banner=Configured enable-sctp

    - name: config dump
      if: steps.sctp_auth.outcome == 'success' && steps.sctp_auth.conclusion == 'success'
      run: ./configdata.pm --dump

    - name: make
      if: steps.sctp_auth.outcome == 'success' && steps.sctp_auth.conclusion == 'success'
      run: make -s -j4

    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        ./util/opensslwrap.sh version -c

    - name: make test
      if: steps.sctp_auth.outcome == 'success' && steps.sctp_auth.conclusion == 'success'
      run: make test HARNESS_JOBS=${HARNESS_JOBS:-4}

  enable_brotli_dynamic:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - name: install brotli
      run: |
        sudo apt-get update
        sudo apt-get -yq --no-install-suggests --no-install-recommends --allow-unauthenticated --allow-downgrades --allow-remove-essential --allow-change-held-packages install brotli libbrotli1 libbrotli-dev
    - name: checkout openssl
      uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora
    - name: config
      run: ./config --strict-warnings enable-comp enable-brotli enable-brotli-dynamic && perl configdata.pm --dump
    - name: make
      run: make -s -j4
    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        ./util/opensslwrap.sh version -c
    - name: make test
      run: make test HARNESS_JOBS=${HARNESS_JOBS:-4}

  enable_zstd_dynamic:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - name: install zstd
      run: |
        sudo apt-get update
        sudo apt-get -yq --no-install-suggests --no-install-recommends --allow-unauthenticated --allow-downgrades --allow-remove-essential --allow-change-held-packages install zstd libzstd1 libzstd-dev
    - name: checkout openssl
      uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora
    - name: config
      run: ./config --strict-warnings enable-comp enable-zstd enable-zstd-dynamic && perl configdata.pm --dump
    - name: make
      run: make -s -j4
    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        ./util/opensslwrap.sh version -c
    - name: make test
      run: make test HARNESS_JOBS=${HARNESS_JOBS:-4}

  enable_brotli_and_zstd_dynamic:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - name: install brotli and zstd
      run: |
        sudo apt-get update
        sudo apt-get -yq --no-install-suggests --no-install-recommends --allow-unauthenticated --allow-downgrades --allow-remove-essential --allow-change-held-packages install brotli libbrotli1 libbrotli-dev
        sudo apt-get -yq --no-install-suggests --no-install-recommends --allow-unauthenticated --allow-downgrades --allow-remove-essential --allow-change-held-packages install zstd libzstd1 libzstd-dev
    - name: checkout openssl
      uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora
    - name: config
      run: ./config --strict-warnings enable-comp enable-brotli enable-brotli-dynamic enable-zstd enable-zstd-dynamic && perl configdata.pm --dump
    - name: make
      run: make -s -j4
    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        ./util/opensslwrap.sh version -c
    - name: make test
      run: make test HARNESS_JOBS=${HARNESS_JOBS:-4}

  malloc_failure_testing:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - name: checkout openssl
      uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: Adjust ASLR for sanitizer
      run: |
        sudo cat /proc/sys/vm/mmap_rnd_bits
        sudo sysctl -w vm.mmap_rnd_bits=28
    - name: config
      run: ./config --strict-warnings --banner=Configured --debug enable-asan enable-crypto-mdebug enable-allocfail-tests && perl configdata.pm --dump
    - name: make
      run: make -s -j4
    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        ./util/opensslwrap.sh version -c
    - name: make test
      continue-on-error: true
      run: |
        make TESTS="test_memfail" test

  enable_brotli_and_asan_ubsan:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - name: install brotli
      run: |
        sudo apt-get update
        sudo apt-get -yq --no-install-suggests --no-install-recommends --allow-unauthenticated --allow-downgrades --allow-remove-essential --allow-change-held-packages install brotli libbrotli1 libbrotli-dev
    - name: checkout openssl
      uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora
    - name: Adjust ASLR for sanitizer
      run: |
        sudo cat /proc/sys/vm/mmap_rnd_bits
        sudo sysctl -w vm.mmap_rnd_bits=28
    - name: config
      run: ./config --strict-warnings --banner=Configured --debug enable-asan enable-ubsan enable-comp enable-brotli -DPEDANTIC && perl configdata.pm --dump
    - name: make
      run: make -s -j4
    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        ./util/opensslwrap.sh version -c
    - name: make test
      run: make test HARNESS_JOBS=${HARNESS_JOBS:-4} OPENSSL_TEST_RAND_ORDER=0

  enable_zstd_and_asan_ubsan:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - name: install zstd
      run: |
        sudo apt-get update
        sudo apt-get -yq --no-install-suggests --no-install-recommends --allow-unauthenticated --allow-downgrades --allow-remove-essential --allow-change-held-packages install zstd libzstd1 libzstd-dev
    - name: checkout openssl
      uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora
    - name: Adjust ASLR for sanitizer
      run: |
        sudo cat /proc/sys/vm/mmap_rnd_bits
        sudo sysctl -w vm.mmap_rnd_bits=28
    - name: config
      run: ./config --strict-warnings --banner=Configured --debug enable-asan enable-ubsan enable-comp enable-zstd -DPEDANTIC && perl configdata.pm --dump
    - name: make
      run: make -s -j4
    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        ./util/opensslwrap.sh version -c
    - name: make test
      run: make test HARNESS_JOBS=${HARNESS_JOBS:-4} OPENSSL_TEST_RAND_ORDER=0

  enable_tfo:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15, macos-15-intel]
    runs-on: ${{matrix.os}}
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora
    - name: config
      run: CC=gcc ./config --strict-warnings --banner=Configured enable-tfo && perl configdata.pm --dump
    - name: make
      run: make -s -j4
    - name: get cpu info
      run: ./util/opensslwrap.sh version -c
    - name: make test
      run: make test HARNESS_JOBS=${HARNESS_JOBS:-4}

  enable_buildtest:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora
    - name: config
      run: ./config --strict-warnings --banner=Configured no-asm no-makedepend enable-buildtest-c++ enable-fips -D_DEFAULT_SOURCE && perl configdata.pm --dump
    - name: make
      run: make -s -j4
    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        ./util/opensslwrap.sh version -c
    - name: make test
      run: make test HARNESS_JOBS=${HARNESS_JOBS:-4}

  memory_sanitizer_slh_dsa:
    needs: [validate-dispatch-inputs]
    if: |
      github.repository == 'openssl/openssl' &&
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: checkout fuzz/corpora submodule
      run: git submodule update --init --depth 1 fuzz/corpora
    - name: Adjust ASLR for sanitizer
      run: |
        sudo cat /proc/sys/vm/mmap_rnd_bits
        sudo sysctl -w vm.mmap_rnd_bits=28
    - name: config
      # --debug -O1 is to produce a debug build that runs in a reasonable amount of time
      run: CC=clang ./config --strict-warnings --banner=Configured --debug no-shared -O1 -fsanitize=memory -DOSSL_SANITIZE_MEMORY -fno-optimize-sibling-calls enable-rc5 enable-md2 enable-ec_nistp_64_gcc_128 enable-fips && perl configdata.pm --dump
    - name: make
      run: make -s -j4
    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        ./util/opensslwrap.sh version -c
    - name: make test
      run: make test HARNESS_JOBS=${HARNESS_JOBS:-4} OPENSSL_TEST_RAND_ORDER=0

  bn_debug:
    needs: [validate-dispatch-inputs]
    if: |
      always() &&
      (needs.validate-dispatch-inputs.result == 'success' || needs.validate-dispatch-inputs.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.head_sha || github.sha }}
    - name: config
      run: ./config --debug --strict-warnings -DBN_DEBUG --banner=Configured -DOPENSSL_NO_SECURE_MEMORY && perl configdata.pm --dump
    - name: make
      run: make -j4 # verbose, so no -s here
    - name: get cpu info
      run: |
        cat /proc/cpuinfo
        ./util/opensslwrap.sh version -c
    - name: make test
      run: .github/workflows/make-test
    - name: save artifacts
      if: success() || failure()
      uses: actions/upload-artifact@v5
      with:
        name: "ci@bn_debug"
        path: artifacts.tar.gz
