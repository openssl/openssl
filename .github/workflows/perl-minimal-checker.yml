# Jobs run per pull request submission
name: Perl-minimal-checker CI
on: [pull_request, push]
permissions:
  contents: read

jobs:
  perl-minimal-checker:
    runs-on: ubuntu-latest
    steps:
    - name: Install perl 5.10
      run: |
        pushd /tmp
        mkdir perl
        wget https://www.cpan.org/src/5.0/perl-5.10.1.tar.bz2
        tar xf perl-5.10.1.tar.bz2
        cd perl-5.10.1
        ./Configure -des -A ccflags='-Wno-incompatible-pointer-types' -A define:malloctype='void *' -A define:freetype='void' -Dlibs='-ldl -lm -lutil -lc'
        make perl
        make install DESTDIR=/tmp/perl
        popd
    - uses: actions/checkout@v4
    - name: Build openssl
      run: ./config && make
    - name: Install sed
      run: sudo apt update && sudo apt install sed
    - name: Check minimal version compliance
      run: |
        PM_FILES=($(find . -name "*.pm"))
        PATH="/tmp/perl/usr/local/bin:$PATH"
        perl -v
        status=0
        for p in "${PM_FILES[@]}"; do PERL5LIB=/tmp/perl/usr/local/lib/perl5/5.10.1/ perl -I"$(pwd)/util/perl" -I"$(pwd)" -I"$(pwd)/external/perl/Text-Template-1.56/lib" -c "$p" | sed -n '/@INC/{p; q1}' || status=1; done;
        exit $status
